<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImgBed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Noise texture overlay -->
      <div class="noise-overlay"></div>

      <!-- Pages -->
      <div class="page page-upload active" data-page="upload">
        <!-- Header -->
        <header class="page-header">
          <div class="header-left">
            <div class="logo-mark">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
              </svg>
            </div>
            <h1 class="app-title">ImgBed</h1>
          </div>
          <div class="watch-toggle" id="watchToggle" title="剪贴板监听">
            <div class="toggle-track">
              <div class="toggle-thumb"></div>
            </div>
            <span class="toggle-label">监听</span>
          </div>
        </header>

        <!-- Upload Portal -->
        <div class="upload-portal" id="uploadPortal">
          <div class="portal-ring"></div>
          <div class="portal-ring ring-2"></div>
          <div class="portal-glow"></div>
          <div class="portal-content">
            <svg class="portal-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span class="portal-text">点击上传剪贴板图片</span>
            <span class="portal-sub">或拖拽图片到此处</span>
          </div>
        </div>

        <!-- Upload Progress (hidden by default) -->
        <div class="upload-progress" id="uploadProgress" style="display:none">
          <div class="progress-orb">
            <div class="orb-ring"></div>
            <div class="orb-core"></div>
          </div>
          <span class="progress-text">上传中...</span>
        </div>

        <!-- History -->
        <div class="history-section">
          <div class="section-header">
            <span class="section-label">最近上传</span>
            <span class="section-count" id="historyCount">0</span>
          </div>
          <div class="history-list" id="historyList">
            <div class="history-empty">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>暂无记录</span>
            </div>
          </div>
        </div>
      </div>

      <div class="page page-settings" data-page="settings">
        <header class="page-header">
          <h1 class="app-title">设置</h1>
        </header>

        <div class="settings-body">
          <!-- Token Section -->
          <div class="settings-card">
            <div class="card-header">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
              </svg>
              <span>GitHub Token</span>
            </div>
            <div class="token-input-group">
              <input
                type="password"
                class="token-input"
                id="tokenInput"
                placeholder="ghp_xxxxxxxxxxxx"
                spellcheck="false"
                autocomplete="off"
              />
              <button class="token-visibility-btn" id="tokenVisibilityBtn" title="显示/隐藏">
                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="token-status" id="tokenStatus">
              <span class="status-indicator"></span>
              <span class="status-text">未配置</span>
            </div>
            <div class="card-actions">
              <button class="btn btn-ghost" id="testTokenBtn">测试连接</button>
              <button class="btn btn-primary" id="saveTokenBtn">保存</button>
            </div>
          </div>

          <!-- Repo Info -->
          <div class="settings-card">
            <div class="card-header">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <span>图床仓库</span>
            </div>
            <div class="config-fields">
              <div class="config-field">
                <label class="config-label">仓库所有者</label>
                <input type="text" class="config-input" id="repoOwnerInput" placeholder="如 JaikenWong" spellcheck="false" />
              </div>
              <div class="config-field">
                <label class="config-label">仓库名</label>
                <input type="text" class="config-input" id="repoNameInput" placeholder="如 Drawing-Bed" spellcheck="false" />
              </div>
              <div class="config-field">
                <label class="config-label">分支</label>
                <input type="text" class="config-input" id="branchInput" placeholder="main" spellcheck="false" />
              </div>
              <div class="config-field">
                <label class="config-label">存储路径</label>
                <input type="text" class="config-input" id="pathPrefixInput" placeholder="images" spellcheck="false" />
              </div>
              <div class="config-field">
                <label class="config-label">CDN 地址</label>
                <input type="text" class="config-input mono" id="cdnBaseInput" placeholder="https://cdn.jsdelivr.net/gh" spellcheck="false" />
              </div>
            </div>
          </div>

          <!-- About -->
          <div class="settings-card about-card">
            <div class="about-content">
              <div class="about-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                </svg>
              </div>
              <span class="about-name">ImgBed</span>
              <span class="about-version">v0.1.0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab Bar -->
      <nav class="tab-bar">
        <button class="tab-item active" data-tab="upload">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>上传</span>
        </button>
        <button class="tab-item" data-tab="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>设置</span>
        </button>
      </nav>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
